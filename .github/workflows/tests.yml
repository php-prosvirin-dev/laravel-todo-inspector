name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12]
        exclude:
          - php: 8.2
            laravel: 12

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:^${{ matrix.laravel }}" --no-interaction --no-progress --with-all-dependencies
          composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test